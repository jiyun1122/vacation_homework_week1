spring.application.name=demo
spring.jackson.property-naming-strategy=SNAKE_CASE

# JWT - Secret Key/Expiration are injected via environment variables in production.
# The default values below are for local development only.
jwt.secret=${JWT_SECRET_KEY:local-dev-only-secret-key-please-override-in-prod-32bytes}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
