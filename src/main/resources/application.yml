spring:
  application:
    name: demo
  jackson:
    property-naming-strategy: SNAKE_CASE

  datasource:
    url: jdbc:mysql://mutsa-vacation-team1.cbik0qigk7jj.ap-northeast-2.rds.amazonaws.com:3306/mutsa_vacation_team1?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET:}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: [profile_nickname, account_email]
            client-name: kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  secret: ${JWT_SECRET:local-dev-only-secret-key-please-override-in-prod-32bytes}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}

app:
  oauth2:
    frontend-redirect-uri: ${FRONTEND_ALLOWED_REDIRECT_URIS:http://localhost:5173/oauth/callback}
    # 프론트가 카카오 인가 요청 시 실제로 사용한 redirect_uri와 정확히 일치해야 함 (카카오 토큰 교환 검증용)
    kakao-redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:5173/auth/kakao/callback}

server:
  port: 8080
  # Nginx가 https -> http(8080)로 프록시하는데 Spring이 이를 신뢰하지 않아
  # 자기 자신의 baseUrl을 http로 인식하던 문제 수정 (Swagger server url, OAuth2 redirect_uri 등에 영향)
  forward-headers-strategy: framework