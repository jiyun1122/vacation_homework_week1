spring:
  application:
    name: demo
  jackson:
    property-naming-strategy: SNAKE_CASE

  datasource:
    url: jdbc:mysql://mutsa-vacation-team1.cbik0qigk7jj.ap-northeast-2.rds.amazonaws.com:3306/mutsa_vacation_team1?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: ${JWT_SECRET_KEY:local-dev-only-secret-key-please-override-in-prod-32bytes}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}

server:
  port: 8080